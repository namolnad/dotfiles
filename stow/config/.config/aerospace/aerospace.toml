# AeroSpace Config — Context-Isolated Workspace Layout
#
# CONTEXTS (binding modes):
#   alt-1 = Personal  (P)    alt-shift-1 = move window to P-T
#   alt-2 = Work      (W)    alt-shift-2 = move window to W-T
#   alt-3 = Loman Group (L)  alt-shift-3 = move window to L-T
#   alt-4 = DML Foundation (D) alt-shift-4 = move window to D-T
#
# PER-CONTEXT WORKSPACES (prefixed by context):
#   alt-t = Terminal    (P-T, W-T, L-T, D-T)
#   alt-b = Browser     (P-B, W-B, L-B, D-B)
#   alt-e = Email       (P-E, W-E, L-E, D-E)
#   alt-c = Calendar    (P-C, W-C, L-C, D-C)
#
# GLOBAL WORKSPACES (shared across all contexts):
#   alt-m = Media       (M)
#   alt-s = System      (S)
#   alt-n = Notes       (N)
#   alt-a = AI          (A)
#   alt-i = IM/Chat     (I)  — Slack, Messages
#   alt-v = Video       (V)  — Zoom
#   alt-r = Tasks       (R)  — Reminders (no alt-shift-r move-to; conflicts with resize mode)
#   alt-g = GitHub      (G)
#   alt-d = Dev Tools   (DT) — Postman, Postico, Xcode, Windsurf, Docker, GitUp, Boop
#   alt-p = Passwords   (PW) — 1Password, Passwords
#
# NAVIGATION:
#   alt-h/j/k/l         = Focus left/down/up/right (vim-style)
#   alt-shift-h/j/k/l   = Move window left/down/up/right
#   alt-slash            = Toggle tile layout (horizontal/vertical)
#   alt-comma            = Toggle accordion layout
#   alt-shift-f          = Fullscreen
#   alt-tab              = Last workspace
#   alt-shift-tab        = Move workspace to next monitor
#   alt-shift-r          = Resize mode (h/j/k/l to resize, b to balance)
#   alt-shift-semicolon  = Service mode (esc=reload, r=reset, f=float toggle)

after-login-command = []
after-startup-command = [
  'workspace P-T',
  'mode main',
  'exec-and-forget ~/.config/aerospace/startup.sh',
]
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse window-lazy-center"

[gaps]
inner.horizontal = 18
inner.vertical =   18
outer.left =       18
outer.bottom =     18
outer.top =        18
outer.right =      18

# =============================================================================
# MODE: main (defaults to Personal context)
# =============================================================================
[mode.main.binding]

# Context switching — lands on context's terminal (home)
alt-1 = ['workspace P-T', 'mode main']
alt-2 = ['workspace W-T', 'mode work']
alt-3 = ['workspace L-T', 'mode loman']
alt-4 = ['workspace D-T', 'mode dml']

# Focus (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-shift-f = 'fullscreen'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Per-context workspaces (Personal)
alt-t = 'workspace P-T'
alt-b = 'workspace P-B'
alt-e = 'workspace P-E'
alt-c = 'workspace P-C'
alt-shift-t = 'move-node-to-workspace P-T'
alt-shift-b = 'move-node-to-workspace P-B'
alt-shift-e = 'move-node-to-workspace P-E'
alt-shift-c = 'move-node-to-workspace P-C'

# Move window to another context's home
alt-shift-1 = 'move-node-to-workspace P-T'
alt-shift-2 = 'move-node-to-workspace W-T'
alt-shift-3 = 'move-node-to-workspace L-T'
alt-shift-4 = 'move-node-to-workspace D-T'

# Global workspaces
alt-m = 'workspace M'
alt-s = 'workspace S'
alt-n = 'workspace N'
alt-a = 'workspace A'
alt-i = 'workspace I'
alt-v = 'workspace V'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-i = 'move-node-to-workspace I'
alt-shift-v = 'move-node-to-workspace V'
alt-r = 'workspace R'
alt-g = 'workspace G'
alt-shift-g = 'move-node-to-workspace G'
alt-d = 'workspace DT'
alt-shift-d = 'move-node-to-workspace DT'
alt-p = 'workspace PW'
alt-shift-p = 'move-node-to-workspace PW'

# Sub-modes
alt-shift-r = 'mode resize'
alt-shift-semicolon = 'mode service'

